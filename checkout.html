<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Step X | Secure Checkout</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="checkout.css">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<header class="navbar">

<div class="container nav-container">

<a href="index.html" class="logo">

<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

<path d="M4 14a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2"/>

<path d="M6 14v6a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-6"/>

</svg>

Step <span>X</span>

</a>

<nav>

<a href="index.html">Home</a>

<a href="index.html#products">Shop</a>

<a href="index.html#contact">Contact</a>

</nav>

</div>

</header>

<!-- ================= HERO ================= -->

<section class="checkout-hero">

<h1>🔒 Secure Checkout</h1>

<p>
Your order is protected with secure checkout.
</p>

</section>

<!-- ================= MAIN ================= -->

<main class="checkout-wrapper">

<!-- ================= LEFT ================= -->

<section class="checkout-left">

<div class="glass-card">

<h2>Shipping Details</h2>

<div class="input-group">

<label>Full Name</label>

<input
type="text"
id="name"
placeholder="Enter your full name">

</div>

<div class="input-group">

<label>Phone Number</label>

<input
type="tel"
id="phone"
placeholder="Enter phone number">

</div>

<div class="input-group">

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter email">

</div>

<div class="input-group">

<label>Delivery Address</label>

<textarea
id="address"
placeholder="House No, Street, City, State..."></textarea>

</div>

</div>

<!-- PAYMENT -->

<div class="glass-card">

<h2>Payment Method</h2>

<label class="payment-card">

<input
type="radio"
name="payment"
checked>

<span>Cash On Delivery</span>

</label>

<label class="payment-card disabled">

<input
type="radio"
disabled>

<span>UPI (Coming Soon)</span>

</label>

</div>

</section>

<!-- ================= RIGHT ================= -->

<aside class="checkout-right">

<div class="glass-card">

<h2>Your Order</h2>

<div id="cartItems">

<!-- JavaScript Will Render Products Here -->

</div>
<!-- ================= COUPON ================= -->

<div class="coupon-box">

<h3>Have a Coupon?</h3>

<div class="coupon-input">

<input
type="text"
id="couponCode"
placeholder="Enter coupon code">

<button id="applyCouponBtn">

Apply

</button>

</div>

<p id="couponMessage"></p>

</div>

<!-- ================= SUMMARY ================= -->

<div class="summary">

<div class="summary-row">

<span>Subtotal</span>

<span id="subtotal">

₹0

</span>

</div>

<div class="summary-row">

<span>Delivery</span>

<span id="delivery">

FREE

</span>

</div>

<div class="summary-row">

<span>Discount</span>

<span id="discount">

₹0

</span>

</div>

<hr>

<div class="summary-row grand-total">

<span>Grand Total</span>

<span id="grandTotal">

₹0

</span>

</div>

<button id="placeOrderBtn">

Place Order

</button>

</div>

</div>

</aside>

</main>

<!-- ================= FOOTER ================= -->

<footer class="checkout-footer">

<p>

© 2026 Step X. All Rights Reserved.

</p>

</footer>

<script src="checkout.js"></script>

</body>
</html>
