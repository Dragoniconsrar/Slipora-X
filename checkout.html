<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step X | Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0d0d0d;
color:#fff;
padding:40px 20px;
}

.container{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:2fr 1fr;
gap:30px;
}

.box{
background:#181818;
padding:25px;
border-radius:18px;
border:1px solid rgba(255,255,255,.08);
}

h2{
margin-bottom:20px;
}

input,textarea{

width:100%;
padding:14px;
margin-bottom:15px;

background:#111;
border:1px solid #333;
border-radius:10px;

color:white;
font-size:15px;
}

textarea{
height:120px;
resize:none;
}

.order-item{

display:flex;
justify-content:space-between;

padding:12px 0;

border-bottom:1px solid rgba(255,255,255,.08);
}

.total{

display:flex;
justify-content:space-between;

margin-top:20px;

font-size:22px;
font-weight:bold;

color:#39ff14;
}

.payment{

margin:25px 0;
}

.payment label{

display:block;

padding:14px;

margin-bottom:12px;

background:#111;

border-radius:10px;

cursor:pointer;

border:1px solid #333;
}

button{

width:100%;

padding:16px;

background:#39ff14;

border:none;

border-radius:50px;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.3s;
}

button:hover{

transform:translateY(-2px);

box-shadow:0 0 20px #39ff14;
}

@media(max-width:800px){

.container{

grid-template-columns:1fr;

}

}

</style>

</head>
<body>

<div class="container">

<div class="box">

<h2>Shipping Details</h2>

<input placeholder="Full Name">

<input placeholder="Phone Number">

<input placeholder="Email">

<textarea placeholder="Full Address"></textarea>

<div class="payment">

<h2>Payment Method</h2>

<label>
<input type="radio" checked>
Cash On Delivery
</label>

<label>
<input type="radio" disabled>
UPI (Coming Soon)
</label>

</div>

<button onclick="placeOrder()">
Place Order
</button>

</div>

<div class="box">

<h2>Your Order</h2>

<div id="orderList"></div>

<div class="total">

<span>Total</span>

<span id="total">₹0</span>

</div>

</div>

</div>

<script>

const cart=JSON.parse(localStorage.getItem("cart"))||[];

const order=document.getElementById("orderList");

let total=0;

cart.forEach(item=>{

total+=item.price*item.qty;

order.innerHTML+=`

<div class="order-item">

<div>

<b>${item.name}</b><br>

${item.qty} × ₹${item.price}

</div>

<div>

₹${item.price*item.qty}

</div>

</div>

`;

});

document.getElementById("total").innerText="₹"+total;

function placeOrder(){

alert("🎉 Order Placed Successfully!\n\nThank You For Shopping With Step X ❤️");

localStorage.removeItem("cart");

window.location.href="index.html";

}

</script>

</body>
</html>
